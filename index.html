<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 Word Spelling Game</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
  background: linear-gradient(135deg, #f093fb, #f5576c, #fda085, #f6d365, #96e6a1, #4facfe);
  background-size: 400% 400%;
  animation: bgMove 12s ease infinite;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

@keyframes bgMove {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.screen { display: none; width: 100%; max-width: 620px; }
.screen.active { display: block; }

.card {
  background: white;
  border-radius: 28px;
  padding: 32px 28px;
  box-shadow: 0 24px 70px rgba(0,0,0,0.22);
}

h1 {
  text-align: center;
  font-size: 2.1em;
  margin-bottom: 22px;
  color: #ff6b6b;
  text-shadow: 2px 2px 0 #ffd93d;
  letter-spacing: 1px;
}

/* ===== SETUP SCREEN ===== */
.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  align-items: center;
}

.input-row input {
  flex: 1;
  padding: 13px 16px;
  border: 3px solid #e0e0e0;
  border-radius: 14px;
  font-size: 1.1em;
  font-family: inherit;
  outline: none;
  transition: border-color 0.25s;
}
.input-row input:focus { border-color: #667eea; }

.emoji-preview {
  min-width: 52px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.9em;
  background: #f4f4f4;
  border-radius: 14px;
  border: 3px solid #e0e0e0;
  transition: transform 0.2s;
}
.emoji-preview.pop { animation: pop 0.2s ease; }
@keyframes pop { 0%,100%{transform:scale(1)} 50%{transform:scale(1.3)} }

.add-btn {
  padding: 13px 18px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 1.3em;
  cursor: pointer;
  transition: transform 0.1s;
  box-shadow: 0 4px 12px rgba(102,126,234,0.4);
}
.add-btn:hover { transform: scale(1.08); }

.counter {
  text-align: center;
  color: #888;
  font-size: 0.95em;
  margin-bottom: 12px;
}

.word-list {
  max-height: 260px;
  overflow-y: auto;
  margin-bottom: 14px;
  padding-right: 4px;
}
.word-list::-webkit-scrollbar { width: 6px; }
.word-list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
.word-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

.word-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 13px;
  background: #f8f9ff;
  border-radius: 12px;
  margin-bottom: 7px;
  animation: slideIn 0.25s ease;
  border: 2px solid #eef0ff;
}
@keyframes slideIn {
  from { transform: translateX(-18px); opacity: 0; }
  to   { transform: translateX(0);     opacity: 1; }
}
.word-item .wi-emoji { font-size: 1.5em; }
.word-item .wi-word  { flex: 1; font-size: 1.1em; font-weight: 700; color: #333; text-transform: uppercase; letter-spacing: 1px; }
.word-item .wi-rm {
  background: #ff6b6b;
  color: white;
  border: none;
  border-radius: 8px;
  padding: 4px 11px;
  cursor: pointer;
  font-size: 0.9em;
  transition: background 0.2s;
}
.word-item .wi-rm:hover { background: #e53935; }

.case-toggle-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  margin-bottom: 18px;
  padding: 14px 16px;
  background: #f4f6ff;
  border-radius: 16px;
  border: 2px dashed #c5cae9;
}
.case-label { color: #666; font-size: 1em; font-weight: 600; }
.case-btn {
  padding: 12px 30px;
  border: 3px solid #ddd;
  border-radius: 50px;
  font-size: 1.3em;
  font-family: inherit;
  font-weight: 800;
  background: white;
  color: #bbb;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 2px;
}
.case-btn:hover { border-color: #999; color: #666; transform: scale(1.05); }
.case-btn.active {
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-color: #667eea;
  color: white;
  box-shadow: 0 4px 14px rgba(102,126,234,0.45);
  transform: scale(1.05);
}

.start-btn {
  width: 100%;
  padding: 17px;
  background: linear-gradient(135deg, #f093fb, #f5576c);
  color: white;
  border: none;
  border-radius: 18px;
  font-size: 1.45em;
  font-family: inherit;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.3s;
  box-shadow: 0 6px 20px rgba(240,147,251,0.5);
  font-weight: 700;
}
.start-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.start-btn:not(:disabled):hover { transform: scale(1.02); }

/* ===== GAME SCREEN ===== */
.progress-track {
  background: #eee;
  border-radius: 10px;
  height: 13px;
  margin-bottom: 6px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea, #f093fb);
  border-radius: 10px;
  transition: width 0.5s ease;
}
.progress-label {
  text-align: center;
  color: #999;
  font-size: 0.93em;
  margin-bottom: 18px;
}

.emoji-clue {
  text-align: center;
  font-size: 5.5em;
  margin: 18px 0 10px;
  line-height: 1;
  animation: bounceIn 0.4s ease;
}
@keyframes bounceIn {
  0%   { transform: scale(0.5); opacity: 0; }
  70%  { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}

.speak-btn {
  display: block;
  margin: 0 auto 20px;
  padding: 10px 26px;
  background: linear-gradient(135deg, #4facfe, #00f2fe);
  color: white;
  border: none;
  border-radius: 50px;
  font-size: 1.05em;
  cursor: pointer;
  transition: transform 0.15s;
  box-shadow: 0 4px 14px rgba(79,172,254,0.4);
  font-family: inherit;
}
.speak-btn:hover { transform: scale(1.06); }
.speak-btn.speaking { animation: pulse 0.6s ease infinite alternate; }
@keyframes pulse { from{opacity:1} to{opacity:0.6} }

.letter-boxes {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 7px;
  margin-bottom: 26px;
  min-height: 68px;
}

.lbox {
  width: 54px;
  height: 62px;
  border: 3px solid #ddd;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.7em;
  font-weight: 800;
  color: #333;
  background: #fafafa;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  user-select: none;
}
.lbox:hover { border-color: #999; }
.lbox.drag-over { border-color: #667eea; background: #eef0ff; transform: scale(1.05); }
.lbox.filled   { background: #fff8e1; border-color: #ffb300; }
.lbox.correct  { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; }
.lbox.wrong    { background: #ffebee; border-color: #ef5350; animation: shake 0.35s ease; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25%      { transform: translateX(-6px); }
  75%      { transform: translateX(6px); }
}

.tiles-area {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 8px;
  min-height: 75px;
  padding: 12px 10px;
  background: #f4f6ff;
  border-radius: 18px;
  border: 2px dashed #c5cae9;
}

.hint-text {
  text-align: center;
  color: #aaa;
  font-size: 0.85em;
  margin-top: 8px;
}

.tile {
  width: 54px;
  height: 62px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.7em;
  font-weight: 800;
  cursor: grab;
  transition: transform 0.12s, opacity 0.2s, box-shadow 0.2s;
  box-shadow: 0 5px 14px rgba(102,126,234,0.4);
  user-select: none;
  touch-action: none;
}
.tile:active { cursor: grabbing; }
.tile.selected {
  transform: scale(1.12) translateY(-4px);
  box-shadow: 0 0 0 3px #ffd93d, 0 8px 20px rgba(102,126,234,0.5);
}
.tile.used { opacity: 0; pointer-events: none; width: 54px; height: 62px; }
.tile.dragging { opacity: 0.4; }

/* ===== OVERLAY MESSAGES ===== */
.overlay-msg {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0);
  background: white;
  border-radius: 28px;
  padding: 34px 55px;
  text-align: center;
  box-shadow: 0 24px 70px rgba(0,0,0,0.28);
  z-index: 200;
  transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  pointer-events: none;
}
.overlay-msg.show { transform: translate(-50%, -50%) scale(1); }
.overlay-msg .om-emoji { font-size: 4.5em; display: block; margin-bottom: 6px; }
.overlay-msg h2 { font-size: 2em; color: #4caf50; margin-bottom: 6px; }
.overlay-msg p  { font-size: 1.3em; color: #555; }

.reveal-overlay h2 { color: #ff6b6b !important; }

.round-badge {
  display: inline-block;
  background: linear-gradient(135deg, #fda085, #f5576c);
  color: white;
  font-size: 0.82em;
  font-weight: 800;
  padding: 3px 12px;
  border-radius: 50px;
  margin-bottom: 6px;
}

.attempt-dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 10px;
}
.attempt-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #eee;
  border: 2px solid #ddd;
  transition: background 0.2s;
}
.attempt-dot.used { background: #ff6b6b; border-color: #e53935; }

/* ===== CONFETTI ===== */
.celebration { position: fixed; inset: 0; pointer-events: none; z-index: 150; overflow: hidden; }
.confetti-piece {
  position: absolute;
  border-radius: 3px;
  animation: cfall linear forwards;
}
@keyframes cfall {
  0%   { transform: translateY(-30px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(105vh) rotate(800deg); opacity: 0; }
}

/* ===== END SCREEN ===== */
.score-ring {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  background: linear-gradient(135deg, #f093fb, #f5576c);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 16px auto 18px;
  color: white;
  box-shadow: 0 12px 35px rgba(240,147,251,0.5);
}
.score-ring .snum { font-size: 3.2em; font-weight: 800; line-height: 1; }
.score-ring .slbl { font-size: 0.9em; margin-top: 2px; }
#end-msg { text-align: center; font-size: 1.2em; color: #555; margin-bottom: 16px; }

/* Word breakdown */
#word-breakdown { margin-bottom: 16px; }
.bd-section { margin-bottom: 14px; }
.bd-title {
  font-size: 0.88em;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.bd-chips { display: flex; flex-wrap: wrap; gap: 7px; }
.bd-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 13px;
  border-radius: 50px;
  font-size: 0.92em;
  font-weight: 700;
  border: 2px solid;
}
.bd-chip .ch-emoji { font-size: 1.1em; }
.bd-chip .ch-word  { letter-spacing: 1px; }
.chip-mastered { background: #e8f5e9; color: #2e7d32; border-color: #66bb6a; }
.chip-passed   { background: #fff8e1; color: #e65100; border-color: #ffa726; }
.chip-failed   { background: #ffebee; color: #c62828; border-color: #ef5350; }

.restart-btn {
  width: 100%;
  padding: 17px;
  background: linear-gradient(135deg, #43e97b, #38f9d7);
  color: white;
  border: none;
  border-radius: 18px;
  font-size: 1.4em;
  font-family: inherit;
  cursor: pointer;
  transition: transform 0.1s;
  box-shadow: 0 6px 20px rgba(67,233,123,0.5);
  font-weight: 700;
  margin-top: 16px;
}
.restart-btn:hover { transform: scale(1.02); }

.newgame-btn {
  width: 100%;
  padding: 17px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: white;
  border: none;
  border-radius: 18px;
  font-size: 1.4em;
  font-family: inherit;
  cursor: pointer;
  transition: transform 0.1s;
  box-shadow: 0 6px 20px rgba(102,126,234,0.4);
  font-weight: 700;
  margin-top: 12px;
}
.newgame-btn:hover { transform: scale(1.02); }

/* ===== RESPONSIVE / MOBILE ===== */

/* Prevent iOS zoom on input focus */
.input-row input { font-size: 16px; }

/* Tablets */
@media (max-width: 640px) {
  body { padding: 12px; align-items: flex-start; }
  .screen { max-width: 100%; }
  .card { border-radius: 22px; padding: 24px 18px; }
  h1 { font-size: 1.8em; margin-bottom: 16px; }
}

/* Phones */
@media (max-width: 480px) {
  body { padding: 8px; }
  .card { border-radius: 18px; padding: 20px 14px; }
  h1 { font-size: 1.5em; margin-bottom: 14px; }

  /* Setup screen */
  .input-row { gap: 6px; }
  .emoji-preview { min-width: 44px; height: 44px; font-size: 1.5em; }
  .add-btn { padding: 10px 14px; font-size: 1.1em; }
  .case-toggle-row { padding: 10px 12px; gap: 8px; flex-wrap: wrap; }
  .case-btn { padding: 10px 22px; font-size: 1.1em; }
  .case-label { font-size: 0.9em; width: 100%; text-align: center; }
  .start-btn { font-size: 1.2em; padding: 15px; }

  /* Game screen */
  .emoji-clue { font-size: 4em; margin: 12px 0 8px; }
  .speak-btn { font-size: 0.95em; padding: 9px 20px; margin-bottom: 14px; }
  .letter-boxes { gap: 5px; margin-bottom: 18px; }
  .lbox { width: 44px; height: 52px; font-size: 1.4em; border-radius: 10px; }
  .tiles-area { gap: 6px; padding: 10px 8px; }
  .tile { width: 44px; height: 52px; font-size: 1.4em; border-radius: 10px; }
  .hint-text { font-size: 0.78em; }
  .overlay-msg { padding: 22px 24px; width: 90vw; }
  .overlay-msg .om-emoji { font-size: 3.5em; }
  .overlay-msg h2 { font-size: 1.6em; }

  /* End screen */
  .score-ring { width: 130px; height: 130px; }
  .score-ring .snum { font-size: 2.6em; }
  .restart-btn, .newgame-btn { font-size: 1.2em; padding: 15px; }
}

/* Very small phones (iPhone SE etc.) */
@media (max-width: 360px) {
  .lbox { width: 38px; height: 46px; font-size: 1.2em; }
  .tile  { width: 38px; height: 46px; font-size: 1.2em; }
  .emoji-clue { font-size: 3.2em; }
  h1 { font-size: 1.3em; }
}
</style>
</head>
<body>

<!-- ===== SETUP SCREEN ===== -->
<div id="setup-screen" class="screen active">
  <div class="card">
    <h1>🌟 Spell It!</h1>
    <div class="input-row">
      <input type="text" id="word-input" placeholder="Type a word…" maxlength="18" autocomplete="off" />
      <div class="emoji-preview" id="emoji-preview">🔤</div>
      <button class="add-btn" id="add-btn" onclick="addWord()">➕</button>
    </div>
    <div class="counter" id="counter">0 words added — add at least 1 to start</div>

    <div class="case-toggle-row">
      <span class="case-label">✏️ Letter style:</span>
      <button class="case-btn active" id="btn-upper" onclick="setCase('upper')">ABC</button>
      <button class="case-btn"        id="btn-lower" onclick="setCase('lower')">abc</button>
    </div>

    <div class="word-list" id="word-list"></div>
    <button class="start-btn" id="start-btn" disabled onclick="startGame()">🎮 Start Game!</button>
  </div>
</div>

<!-- ===== GAME SCREEN ===== -->
<div id="game-screen" class="screen">
  <div class="card">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">Word 1 / ?</div>
    <div style="text-align:center" id="round-badge-wrap"></div>
    <div class="attempt-dots" id="attempt-dots">
      <div class="attempt-dot" id="dot-0"></div>
      <div class="attempt-dot" id="dot-1"></div>
      <div class="attempt-dot" id="dot-2"></div>
    </div>
    <div class="emoji-clue" id="game-emoji">🐶</div>
    <button class="speak-btn" id="speak-btn" onclick="speakWord()">🔊 Hear the Word</button>
    <div class="letter-boxes" id="letter-boxes"></div>
    <div class="tiles-area" id="tiles-area"></div>
    <div class="hint-text">Tap a letter tile, then tap a box — or drag &amp; drop!</div>
  </div>
</div>

<!-- ===== END SCREEN ===== -->
<div id="end-screen" class="screen">
  <div class="card">
    <h1>🎉 All Done!</h1>
    <div class="score-ring">
      <span class="snum" id="final-score">0/0</span>
      <span class="slbl">correct!</span>
    </div>
    <p id="end-msg"></p>
    <div id="word-breakdown"></div>
    <button class="restart-btn" onclick="tryAgain()">🔄 Try Again</button>
    <button class="newgame-btn" onclick="startNewGame()">✏️ Start New Game</button>
  </div>
</div>

<!-- Celebration layer -->
<div class="celebration" id="celebration"></div>

<!-- Correct word overlay -->
<div class="overlay-msg" id="overlay-msg">
  <span class="om-emoji" id="om-emoji">⭐</span>
  <h2>Correct! 🎉</h2>
  <p id="om-word"></p>
</div>

<!-- Reveal answer overlay (shown after 3 failed attempts) -->
<div class="overlay-msg reveal-overlay" id="reveal-msg">
  <span class="om-emoji" id="rv-emoji">😅</span>
  <h2 style="color:#ff6b6b;">The answer is...</h2>
  <p id="rv-word" style="font-size:2em; font-weight:900; color:#333; letter-spacing:4px;"></p>
</div>

<script>

function getEmoji(word) {
  return EMOJI[word.toLowerCase().trim()] || '❓';
}

// ============================================================
//  STATE
// ============================================================
let wordList  = [];         // [{word, emoji}]
let gameWords = [];         // current round's word queue
let currentIdx = 0;
let score = 0;
let round = 1;
const MAX_ROUNDS   = 2;
const MAX_ATTEMPTS = 3;
let currentAttempts = 0;        // wrong attempts for current word
let wrongWordsThisRound = [];   // words failed this round → replayed next round
// Per-word outcome: 'mastered' | 'passed' | 'failed' | 'shown'(transient)
let wordResults = {};

let boxes = [];   // [{el, letter, tileIdx}]
let tiles = [];   // [{letter, el, used}]
let selectedTileIdx = null;
let preferredVoice = null;
let letterCase = 'upper'; // 'upper' | 'lower'

function setCase(mode) {
  letterCase = mode;
  document.getElementById('btn-upper').classList.toggle('active', mode === 'upper');
  document.getElementById('btn-lower').classList.toggle('active', mode === 'lower');
}

function applyCase(letter) {
  return letterCase === 'upper' ? letter.toUpperCase() : letter.toLowerCase();
}

// Pick a friendly female voice from the available list
function pickVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (!voices.length) return null;
  const priority = [
    'Samantha',          // iOS / macOS
    'Karen',             // iOS AU
    'Moira',             // iOS IE
    'Tessa',             // iOS ZA
    'Microsoft Zira',    // Windows
    'Google US English', // Android Chrome
    'Fiona', 'Victoria',
  ];
  for (const name of priority) {
    const v = voices.find(v => v.name.includes(name));
    if (v) return v;
  }
  return (
    voices.find(v => /female/i.test(v.name) && v.lang.startsWith('en')) ||
    voices.find(v => v.lang === 'en-US') ||
    voices.find(v => v.lang.startsWith('en')) ||
    null
  );
}
// Keep voices updated (desktop fires this; mobile may not)
window.speechSynthesis.onvoiceschanged = () => { preferredVoice = pickVoice(); };
preferredVoice = pickVoice();

// ============================================================
//  SETUP SCREEN
// ============================================================
const wordInput   = document.getElementById('word-input');
const emojiPreview = document.getElementById('emoji-preview');

wordInput.addEventListener('input', () => {
  const v = wordInput.value.trim();
  const e = v ? getEmoji(v) : '🔤';
  if (emojiPreview.textContent !== e) {
    emojiPreview.textContent = e;
    emojiPreview.classList.remove('pop');
    void emojiPreview.offsetWidth;
    emojiPreview.classList.add('pop');
  }
});

wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });

function addWord() {
  const v = wordInput.value.trim().toLowerCase().replace(/[^a-z]/g, '');
  if (!v) return;
  const emoji = getEmoji(v);
  wordList.push({ word: v, emoji });
  renderWordList();
  wordInput.value = '';
  emojiPreview.textContent = '🔤';
  wordInput.focus();
}

function removeWord(i) {
  wordList.splice(i, 1);
  renderWordList();
}

function renderWordList() {
  const listEl  = document.getElementById('word-list');
  const counter = document.getElementById('counter');
  const startBtn = document.getElementById('start-btn');

  const n = wordList.length;
  counter.textContent = n === 0
    ? '0 words added — add at least 1 to start'
    : `${n} word${n !== 1 ? 's' : ''} added`;
  startBtn.disabled = n < 1;

  listEl.innerHTML = '';
  wordList.forEach((w, i) => {
    const item = document.createElement('div');
    item.className = 'word-item';
    item.innerHTML = `
      <span class="wi-emoji">${w.emoji}</span>
      <span class="wi-word">${w.word}</span>
      <button class="wi-rm" onclick="removeWord(${i})">✕</button>
    `;
    listEl.appendChild(item);
  });
}

function startGame() {
  gameWords = [...wordList].sort(() => Math.random() - 0.5);
  currentIdx = 0;
  score = 0;
  round = 1;
  currentAttempts = 0;
  wrongWordsThisRound = [];
  wordResults = {};
  showScreen('game-screen');
  loadWord();
}

// ============================================================
//  GAME SCREEN
// ============================================================
function loadWord() {
  selectedTileIdx = null;
  const { word, emoji } = gameWords[currentIdx];

  // Progress
  const total   = gameWords.length;
  const current = currentIdx + 1;
  document.getElementById('progress-label').textContent = `Word ${current} / ${total}`;
  document.getElementById('progress-fill').style.width  = `${((current - 1) / total) * 100}%`;

  // Round badge (only show on round 2+)
  const badgeWrap = document.getElementById('round-badge-wrap');
  badgeWrap.innerHTML = round > 1
    ? `<span class="round-badge">Round ${round} / ${MAX_ROUNDS}</span>`
    : '';

  // Reset attempt dots
  currentAttempts = 0;
  updateAttemptDots();

  document.getElementById('game-emoji').textContent = emoji;

  // Letter boxes
  const boxContainer = document.getElementById('letter-boxes');
  boxContainer.innerHTML = '';
  boxes = [];
  for (let i = 0; i < word.length; i++) {
    const el = document.createElement('div');
    el.className = 'lbox';
    el.dataset.idx = i;
    el.addEventListener('click',    () => handleBoxClick(i));
    el.addEventListener('dragover',  e  => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', ()  => el.classList.remove('drag-over'));
    el.addEventListener('drop',      e  => handleDrop(e, i));
    boxContainer.appendChild(el);
    boxes.push({ el, letter: null, tileIdx: null });
  }

  // Build tiles: 8 total if word < 5 letters, 10 total if >= 5 letters
  const TOTAL_TILES = word.length < 5 ? 8 : 10;
  const wordLetters = word.split('').map((letter, i) => ({ letter, origIdx: i, used: false, el: null, isReal: true }));
  const alphabet = 'abcdefghijklmnopqrstuvwxyz';
  const distractors = [];
  while (wordLetters.length + distractors.length < TOTAL_TILES) {
    distractors.push({ letter: alphabet[Math.floor(Math.random() * 26)], origIdx: -1, used: false, el: null, isReal: false });
  }
  tiles = [...wordLetters, ...distractors];
  shuffle(tiles);

  renderTiles();
}

function renderTiles() {
  const area = document.getElementById('tiles-area');
  area.innerHTML = '';
  tiles.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'tile' + (t.used ? ' used' : '');
    el.textContent = applyCase(t.letter);
    el.dataset.idx = i;
    el.draggable = true;
    el.addEventListener('click',     () => handleTileClick(i));
    el.addEventListener('dragstart', e  => { e.dataTransfer.setData('tileIdx', i); el.classList.add('dragging'); });
    el.addEventListener('dragend',   () => el.classList.remove('dragging'));
    initTouchDrag(el, i);
    area.appendChild(el);
    t.el = el;
  });
}

// ---- Tile click ----
function handleTileClick(i) {
  const t = tiles[i];
  if (t.used) return;

  if (selectedTileIdx === i) {
    deselectTile(); return;
  }
  deselectTile();
  selectedTileIdx = i;
  t.el.classList.add('selected');

  // Auto-place in first empty box
  const emptyBox = boxes.findIndex(b => b.letter === null);
  if (emptyBox !== -1) placeTileInBox(i, emptyBox);
}

// ---- Box click ----
function handleBoxClick(i) {
  const box = boxes[i];
  if (box.letter !== null) {
    // Return tile
    const ti = box.tileIdx;
    if (ti !== null) { tiles[ti].used = false; tiles[ti].el?.classList.remove('used'); }
    box.letter = null; box.tileIdx = null;
    box.el.textContent = '';
    box.el.classList.remove('filled');
    return;
  }
  if (selectedTileIdx !== null) placeTileInBox(selectedTileIdx, i);
}

// ---- Drag drop ----
function handleDrop(e, boxIdx) {
  e.preventDefault();
  boxes[boxIdx].el.classList.remove('drag-over');
  const ti = parseInt(e.dataTransfer.getData('tileIdx'));
  if (isNaN(ti)) return;
  // Return existing tile in box
  if (boxes[boxIdx].letter !== null) {
    const old = boxes[boxIdx].tileIdx;
    if (old !== null) { tiles[old].used = false; tiles[old].el?.classList.remove('used'); }
  }
  placeTileInBox(ti, boxIdx);
}

// ---- Core placement ----
function placeTileInBox(ti, bi) {
  const t = tiles[ti];
  if (t.used) return;
  t.used = true;
  t.el?.classList.add('used');
  t.el?.classList.remove('selected');
  deselectTile(false);

  boxes[bi].letter  = t.letter;
  boxes[bi].tileIdx = ti;
  boxes[bi].el.textContent = applyCase(t.letter);
  boxes[bi].el.classList.add('filled');

  if (boxes.every(b => b.letter !== null)) checkAnswer();
}

function deselectTile(clearIdx = true) {
  if (selectedTileIdx !== null) tiles[selectedTileIdx]?.el?.classList.remove('selected');
  if (clearIdx) selectedTileIdx = null;
}

// ---- Attempt dots ----
function updateAttemptDots() {
  for (let i = 0; i < MAX_ATTEMPTS; i++) {
    document.getElementById(`dot-${i}`)
      .classList.toggle('used', i < currentAttempts);
  }
}

// ---- Check ----
function checkAnswer() {
  const answer = boxes.map(b => b.letter).join('');
  const target = gameWords[currentIdx].word;

  if (answer === target) {
    boxes.forEach(b => b.el.classList.add('correct'));
    wordResults[target] = round === 1 ? 'mastered' : 'passed';
    score++;
    showCorrectOverlay();
  } else {
    boxes.forEach(b => b.el.classList.add('wrong'));
    currentAttempts++;
    updateAttemptDots();

    if (currentAttempts >= MAX_ATTEMPTS) {
      // 3 wrong attempts — reveal answer then move on
      setTimeout(() => {
        resetBoxes();
        showRevealOverlay();
      }, 650);
    } else {
      setTimeout(resetBoxes, 650);
    }
  }
}

// ---- Reveal answer after 3 fails ----
function showRevealOverlay() {
  const { emoji, word } = gameWords[currentIdx];
  document.getElementById('rv-emoji').textContent = emoji;
  document.getElementById('rv-word').textContent  = applyCase(word);
  if (round < MAX_ROUNDS) {
    wordResults[word] = 'shown';          // transient — will become 'passed' or 'failed'
    wrongWordsThisRound.push(gameWords[currentIdx]);
  } else {
    wordResults[word] = 'failed';         // no more chances
  }
  const msg = document.getElementById('reveal-msg');
  msg.classList.add('show');
  setTimeout(() => {
    msg.classList.remove('show');
    advanceWord();
  }, 5000);
}

// ---- Advance to next word or next round or end ----
function advanceWord() {
  currentIdx++;
  if (currentIdx < gameWords.length) {
    loadWord();
    return;
  }
  // End of current round
  if (round < MAX_ROUNDS && wrongWordsThisRound.length > 0) {
    // Start next round with only the words they got wrong
    round++;
    gameWords = [...wrongWordsThisRound].sort(() => Math.random() - 0.5);
    wrongWordsThisRound = [];
    currentIdx = 0;
    currentAttempts = 0;
    loadWord();
  } else {
    showEndScreen();
  }
}

function resetBoxes() {
  boxes.forEach(b => {
    b.el.classList.remove('wrong', 'filled');
    b.el.textContent = '';
    if (b.tileIdx !== null) {
      tiles[b.tileIdx].used = false;
      tiles[b.tileIdx].el?.classList.remove('used');
    }
    b.letter = null; b.tileIdx = null;
  });
  selectedTileIdx = null;
}

// ---- Correct overlay ----
function showCorrectOverlay() {
  const { emoji, word } = gameWords[currentIdx];
  document.getElementById('om-emoji').textContent = emoji;
  document.getElementById('om-word').textContent  = word.toUpperCase();
  const msg = document.getElementById('overlay-msg');
  msg.classList.add('show');
  launchConfetti();
  playCheer();          // short applause on each correct word
  setTimeout(() => {
    msg.classList.remove('show');
    advanceWord();
  }, 2000);
}

// ---- Speak ----
let resumeTimer = null;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

function speakWord() {
  if (!('speechSynthesis' in window)) return;
  const synth = window.speechSynthesis;
  const btn   = document.getElementById('speak-btn');

  // Stop anything playing
  if (synth.speaking || synth.pending) synth.cancel();

  const utt = new SpeechSynthesisUtterance(gameWords[currentIdx].word);
  utt.rate   = 0.75;
  utt.pitch  = 1.6;
  utt.volume = 1;
  utt.lang   = 'en-US';

  // On iOS: do NOT set .voice — letting the browser pick its own default
  // is the only reliable way to get speech to work on iOS Safari.
  // On other platforms: pick a friendly female voice.
  if (!isIOS) {
    const voice = pickVoice();
    if (voice) utt.voice = voice;
  }

  btn.classList.add('speaking');

  // Keep synth alive — iOS pauses it silently on long words
  clearInterval(resumeTimer);
  resumeTimer = setInterval(() => {
    if (synth.paused) synth.resume();
    if (!synth.speaking && !synth.pending) {
      clearInterval(resumeTimer);
      btn.classList.remove('speaking');
    }
  }, 200);

  utt.onend = utt.onerror = () => {
    clearInterval(resumeTimer);
    btn.classList.remove('speaking');
  };

  // MUST call speak() synchronously here — any setTimeout breaks the
  // iOS user-gesture requirement and silently prevents speech.
  synth.speak(utt);
}

// ============================================================
//  SOUND EFFECTS (Web Audio API — no external files needed)
// ============================================================

// Shared: one single clap noise burst
function makeClap(ctx, startTime, volume) {
  if (startTime < ctx.currentTime) return;
  const len  = Math.floor(ctx.sampleRate * (0.055 + Math.random() * 0.075));
  const buf  = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let s = 0; s < len; s++) {
    data[s] = (Math.random() * 2 - 1) * Math.exp(-s / (len * 0.28));
  }
  const src  = ctx.createBufferSource();
  src.buffer = buf;
  const bpf  = ctx.createBiquadFilter();
  bpf.type   = 'bandpass';
  bpf.frequency.value = 900 + Math.random() * 2200;
  bpf.Q.value = 0.4 + Math.random() * 0.9;
  const gain = ctx.createGain();
  gain.gain.value = Math.max(0.001, volume);
  src.connect(bpf); bpf.connect(gain); gain.connect(ctx.destination);
  src.start(startTime);
}


// Short burst of clapping for each correct word
function playCheer() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  try {
    const ctx   = new AC();
    const now   = ctx.currentTime;
    const dur   = 1.8;
    const count = 50;
    for (let i = 0; i < count; i++) {
      const p   = i / count;
      const env = p < 0.15 ? p / 0.15 : p > 0.75 ? (1 - p) / 0.25 : 1;
      const t   = p * dur + (Math.random() - 0.5) * 0.06;
      makeClap(ctx, now + Math.max(0, t), 0.55 * env * (0.65 + Math.random() * 0.35));
    }
setTimeout(() => ctx.close(), (dur + 0.8) * 1000);
  } catch (e) {}
}

// Big applause + cheering for game end
function playApplause() {
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  try {
    const ctx   = new AC();
    const now   = ctx.currentTime;
    const dur   = 6;
    const count = 180;
    for (let i = 0; i < count; i++) {
      const p   = i / count;
      const env = p < 0.10 ? p / 0.10 : p > 0.78 ? (1 - p) / 0.22 : 1;
      const t   = p * dur * 0.97 + (Math.random() - 0.5) * (dur / count) * 1.3;
      makeClap(ctx, now + Math.max(0, t), 0.6 * env * (0.6 + Math.random() * 0.4));
    }
setTimeout(() => ctx.close(), (dur + 1) * 1000);
  } catch (e) {}
}

function speakResult(text) {
  if (!('speechSynthesis' in window)) return;
  const synth = window.speechSynthesis;
  if (synth.speaking || synth.pending) synth.cancel();
  const utt   = new SpeechSynthesisUtterance(text);
  utt.lang    = 'en-US';
  utt.rate    = 0.85;
  utt.pitch   = 1.5;
  utt.volume  = 1;
  if (!isIOS) { const v = pickVoice(); if (v) utt.voice = v; }
  synth.speak(utt);
}

function renderWordBreakdown() {
  const mastered = wordList.filter(w => wordResults[w.word] === 'mastered');
  const passed   = wordList.filter(w => wordResults[w.word] === 'passed');
  const failed   = wordList.filter(w => wordResults[w.word] === 'failed' || !wordResults[w.word]);

  const wrap = document.getElementById('word-breakdown');
  wrap.innerHTML = '';

  function makeSection(title, colorClass, words) {
    if (!words.length) return;
    const sec = document.createElement('div');
    sec.className = 'bd-section';
    sec.innerHTML = `<div class="bd-title">${title}</div>`;
    const chips = document.createElement('div');
    chips.className = 'bd-chips';
    words.forEach(w => {
      const chip = document.createElement('div');
      chip.className = `bd-chip ${colorClass}`;
      chip.innerHTML = `<span class="ch-emoji">${w.emoji}</span><span class="ch-word">${applyCase(w.word)}</span>`;
      chips.appendChild(chip);
    });
    sec.appendChild(chips);
    wrap.appendChild(sec);
  }

  makeSection('⭐ Mastered!',            'chip-mastered', mastered);
  makeSection('💪 Got it with help!',    'chip-passed',   passed);
  makeSection('📖 Keep practising!',     'chip-failed',   failed);
}

function showEndScreen() {
  const total   = wordList.length;               // always the original word count
  const mastered = wordList.filter(w => wordResults[w.word] === 'mastered').length;
  const passed   = wordList.filter(w => wordResults[w.word] === 'passed').length;
  const correct  = mastered + passed;

  document.getElementById('final-score').textContent = `${correct}/${total}`;

  const pct = correct / total;
  const msgs = [
    [1.0, '🌟 Perfect! You are a spelling superstar!'],
    [0.8, '🎉 Amazing job! Almost flawless!'],
    [0.6, '👍 Great effort! Keep practising!'],
    [0.4, '😊 Good try! You\'re getting there!'],
    [0,   '💪 Keep going! Practice makes perfect!'],
  ];
  document.getElementById('end-msg').textContent = msgs.find(([t]) => pct >= t)[1];

  renderWordBreakdown();
  showScreen('end-screen');

  if (correct === total) {
    launchConfetti();
    playApplause();
    setTimeout(() => speakResult('Amazing! You got them all! Well done!'), 800);
  }
}

function tryAgain() {

  round = 1;
  currentAttempts = 0;
  wrongWordsThisRound = [];
  wordResults = {};
  showScreen('game-screen');

// ============================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

// ============================================================
//  TOUCH DRAG-AND-DROP (pointer events — works on mobile)
// ============================================================
let dragGhost = null;
let draggingTileIdx = null;

function initTouchDrag(el, tileIdx) {
  el.addEventListener('pointerdown', e => {
    if (e.pointerType === 'mouse') return; // mouse uses native drag
    e.preventDefault();
    draggingTileIdx = tileIdx;

    // Create a floating ghost clone
    dragGhost = el.cloneNode(true);
    dragGhost.style.cssText = `
      position:fixed; z-index:999; pointer-events:none;
      width:${el.offsetWidth}px; height:${el.offsetHeight}px;
      opacity:0.85; transform:scale(1.15);
      transition:none; border-radius:14px;
    `;
    moveGhost(e);
    document.body.appendChild(dragGhost);
    el.classList.add('dragging');
  });

  el.addEventListener('pointermove', e => {
    if (draggingTileIdx === null || e.pointerType === 'mouse') return;
    e.preventDefault();
    moveGhost(e);
  });

  el.addEventListener('pointerup', e => {
    if (draggingTileIdx === null || e.pointerType === 'mouse') return;
    e.preventDefault();
    cleanupGhost(e);
    // Find which box is under the finger
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const boxEl = target?.closest('.lbox');
    if (boxEl) {
      const boxIdx = parseInt(boxEl.dataset.idx);
      if (!isNaN(boxIdx)) {
        if (boxes[boxIdx].letter !== null) {
          const old = boxes[boxIdx].tileIdx;
          if (old !== null) { tiles[old].used = false; tiles[old].el?.classList.remove('used'); }
        }
        placeTileInBox(draggingTileIdx, boxIdx);
      }
    }
    tiles[draggingTileIdx]?.el?.classList.remove('dragging');
    draggingTileIdx = null;
  });

  el.addEventListener('pointercancel', () => {
    cleanupGhost(null);
    if (draggingTileIdx !== null) tiles[draggingTileIdx]?.el?.classList.remove('dragging');
    draggingTileIdx = null;
  });
}

function moveGhost(e) {
  if (!dragGhost) return;
  dragGhost.style.left = (e.clientX - dragGhost.offsetWidth / 2) + 'px';
  dragGhost.style.top  = (e.clientY - dragGhost.offsetHeight / 2) + 'px';
}

function cleanupGhost() {
  dragGhost?.remove();
  dragGhost = null;
}
</script>
</body>
</html>
